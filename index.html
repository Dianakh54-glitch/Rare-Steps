<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rare Steps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #fff0f5;
      color: #222;
    }

    header {
      background: linear-gradient(90deg, #ff4da6, #ff99cc);
      padding: 20px;
      text-align: center;
      color: white;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    nav {
      text-align: center;
      padding: 10px;
      background: white;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #ff4da6;
      font-weight: 500;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #555;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #ff4da6;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 500;
    }

    .products {
      padding: 40px 20px;
      text-align: center;
    }

    .products h2 {
      margin-bottom: 30px;
    }

    .product-card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      margin: 15px;
      display: inline-block;
      width: 250px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .slider {
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
    }

    .slider img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #ff4da6;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>Rare Steps 👟💗</header>

<nav>
  <a href="#home">Home</a>
  <a href="#products">Shoes</a>
</nav>

<section class="hero" id="home">
  <h1>Rare. Clean. Yours.</h1>
  <p>I sell lightly used & rare sneakers you won’t find everywhere.</p>

  <a class="btn" href="https://wa.me/96171499263" target="_blank">
    Order on WhatsApp
  </a>
</section>

<section class="products" id="products">
  <h2>Available Shoes</h2>

  <div class="product-card">
    <div class="slider">
      <img src="shoe1.jpg">
    </div>
    <h3>Nike Air Jordan</h3>
    <p>Lightly used • Size 38</p>
  </div>

  <div class="product-card">
    <div class="slider">
      <img src="shoe2.jpg">
    </div>
    <h3>Adidas Samba</h3>
    <p>Rare piece • Size 37</p>
  </div>

</section>

<footer>
  © 2026 Rare Steps — DM on WhatsApp to order 💗
</footer>

</body>
</html>
